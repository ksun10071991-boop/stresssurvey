<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>情绪压力测试量表</title>
<style>
  :root{
    --bg:#f7f5f2;
    --card:#ffffff;
    --ink:#2b2620;
    --ink-soft:#6b6258;
    --accent:#a8643b;
    --accent-soft:#f0e2d6;
    --line:#e6e0d8;
    --ctrl:#c97b3f;
    --exp:#3f7a6b;
    --warn:#c0463a;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
    background:var(--bg);
    color:var(--ink);
    padding-bottom:60px;
  }
  header{
    background:var(--card);
    border-bottom:1px solid var(--line);
    padding:16px 20px;
    position:sticky;
    top:0;
    z-index:10;
  }
  header h1{
    font-size:18px;
    margin:0 0 10px 0;
    font-weight:600;
  }
  .tabs{display:flex;gap:8px;}
  .tab-btn{
    flex:1;
    padding:10px 8px;
    border:1px solid var(--line);
    background:#fff;
    border-radius:10px;
    font-size:14px;
    color:var(--ink-soft);
    cursor:pointer;
    transition:all .15s;
  }
  .tab-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}
  main{max-width:680px;margin:0 auto;padding:18px 16px 40px;}
  .card{
    background:var(--card);
    border-radius:var(--radius);
    padding:18px;
    margin-bottom:16px;
    border:1px solid var(--line);
  }
  .field-row{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
  .field{flex:1;min-width:140px;}
  label.field-label{display:block;font-size:13px;color:var(--ink-soft);margin-bottom:6px;}
  input[type=text]{
    width:100%;
    padding:10px 12px;
    border:1px solid var(--line);
    border-radius:10px;
    font-size:15px;
    background:#fcfbf9;
  }
  .seg{display:flex;gap:6px;}
  .seg button{
    flex:1;
    padding:9px 6px;
    border:1px solid var(--line);
    background:#fcfbf9;
    border-radius:10px;
    font-size:13px;
    cursor:pointer;
    color:var(--ink-soft);
  }
  .seg button.sel[data-val="对照组"]{background:var(--ctrl);color:#fff;border-color:var(--ctrl);}
  .seg button.sel[data-val="实验组"]{background:var(--exp);color:#fff;border-color:var(--exp);}
  .seg button.sel[data-val="测试前"]{background:var(--accent);color:#fff;border-color:var(--accent);}
  .seg button.sel[data-val="测试后"]{background:var(--accent);color:#fff;border-color:var(--accent);}

  .question{border-top:1px solid var(--line);padding:16px 0;}
  .question:first-of-type{border-top:none;padding-top:4px;}
  .q-section-title{
    font-size:13px;
    font-weight:700;
    color:var(--accent);
    margin:18px 0 4px;
    padding-top:14px;
    border-top:1px solid var(--line);
  }
  .q-section-title:first-child{border-top:none;padding-top:0;margin-top:0;}
  .q-instruction{
    font-size:12.5px;
    color:var(--ink-soft);
    margin-bottom:10px;
    line-height:1.5;
  }
  .q-title{font-size:14.5px;font-weight:600;margin-bottom:10px;line-height:1.5;}
  .q-anchors{display:flex;justify-content:space-between;font-size:11.5px;color:var(--ink-soft);margin-bottom:8px;}
  .scale{display:flex;gap:5px;flex-wrap:wrap;}
  .scale button{
    flex:1;
    min-width:28px;
    padding:9px 0;
    border:1px solid var(--line);
    background:#fcfbf9;
    border-radius:8px;
    font-size:13.5px;
    cursor:pointer;
    color:var(--ink);
  }
  .scale.text-scale button{min-width:60px;font-size:12.5px;padding:9px 4px;}
  .scale button.sel{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:600;}
  .ref-chip{
    display:inline-block;
    margin-top:8px;
    padding:4px 10px;
    background:var(--accent-soft);
    border-radius:20px;
    font-size:12px;
    color:var(--accent);
  }
  .ref-chip b{font-size:13px;}

  .submit-btn{
    width:100%;
    padding:14px;
    background:var(--accent);
    color:#fff;
    border:none;
    border-radius:12px;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    margin-top:6px;
  }
  .submit-btn:disabled{background:#cfc7bd;cursor:not-allowed;}
  .status-banner{padding:10px 14px;border-radius:10px;font-size:13px;margin-bottom:14px;}
  .status-banner.ok{background:#e7f2ed;color:#2e6b53;}
  .status-banner.warn{background:#fbe9e7;color:var(--warn);}
  .status-banner.info{background:var(--accent-soft);color:var(--accent);}

  .lookup-row{display:flex;gap:8px;margin-bottom:16px;}
  .lookup-row input{flex:1;}
  .lookup-row button{
    padding:10px 18px;
    background:var(--ink);
    color:#fff;
    border:none;
    border-radius:10px;
    font-size:14px;
    cursor:pointer;
    white-space:nowrap;
  }
  .group-block{margin-bottom:20px;}
  .group-block h3{
    font-size:14px;
    margin:0 0 10px 2px;
  }
  .group-block h3.tag-ctrl{color:var(--ctrl);}
  .group-block h3.tag-exp{color:var(--exp);}
  table.compare{width:100%;border-collapse:collapse;font-size:13px;}
  table.compare th, table.compare td{border:1px solid var(--line);padding:8px 6px;text-align:center;}
  table.compare th{background:#fbf9f6;font-weight:600;font-size:12px;}
  table.compare td.qname{text-align:left;font-size:12.5px;color:var(--ink-soft);}
  table.compare td.flag-same{background:#fbe9e7;color:var(--warn);font-weight:700;}
  table.compare td.flag-diff{background:#e7f2ed;}
  .record-meta{font-size:11.5px;color:var(--ink-soft);margin-top:2px;}
  .edit-btn{
    display:block;
    margin:6px auto 0;
    padding:4px 10px;
    background:var(--accent);
    color:#fff;
    border:none;
    border-radius:8px;
    font-size:11.5px;
    cursor:pointer;
  }
  .legend{display:flex;gap:16px;font-size:12px;color:var(--ink-soft);margin-top:10px;flex-wrap:wrap;}
  .legend span{display:flex;align-items:center;gap:5px;}
  .dot{width:10px;height:10px;border-radius:50%;display:inline-block;}

  .export-btn{
    width:100%;
    padding:12px;
    background:var(--exp);
    color:#fff;
    border:none;
    border-radius:12px;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
    margin-top:14px;
  }
  .empty-state{text-align:center;color:var(--ink-soft);padding:30px 10px;font-size:14px;}
  .small-note{font-size:12px;color:var(--ink-soft);margin-top:6px;line-height:1.5;}
  .hidden{display:none !important;}
  .save-indicator{font-size:12px;color:var(--ink-soft);text-align:center;margin-top:8px;}
</style>
</head>
<body>

<header>
  <h1>情绪压力测试量表</h1>
  <div class="tabs">
    <button class="tab-btn active" data-tab="fill">填写问卷</button>
    <button class="tab-btn" data-tab="review">研究人员核对</button>
  </div>
</header>

<main>
  <div id="syncBanner"></div>

  <!-- ============ FILL TAB ============ -->
  <div id="tab-fill">
    <div class="card">
      <div class="field-row">
        <div class="field">
          <label class="field-label">受试者编号</label>
          <input type="text" id="subjectId" placeholder="例如 001AB" inputmode="text">
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label class="field-label">实验组别</label>
          <div class="seg" id="groupSeg">
            <button data-val="对照组">对照组</button>
            <button data-val="实验组">实验组</button>
          </div>
        </div>
        <div class="field">
          <label class="field-label">测试阶段</label>
          <div class="seg" id="stageSeg">
            <button data-val="测试前">测试前</button>
            <button data-val="测试后">测试后</button>
          </div>
        </div>
      </div>
      <div id="refBanner"></div>
    </div>

    <div class="card" id="questionCard"></div>

    <button class="submit-btn" id="submitBtn" disabled>请先填写编号、组别与阶段</button>
    <div class="save-indicator" id="saveIndicator"></div>
  </div>

  <!-- ============ REVIEW TAB ============ -->
  <div id="tab-review" class="hidden">
    <div class="card">
      <div class="lookup-row">
        <input type="text" id="lookupId" placeholder="输入受试者编号，例如 001AB" inputmode="text">
        <button id="lookupBtn">查看</button>
      </div>
      <div class="legend">
        <span><span class="dot" style="background:#fbe9e7;border:1px solid var(--warn)"></span>测试前后分数完全相同（建议核实）</span>
        <span><span class="dot" style="background:#e7f2ed;border:1px solid #2e6b53"></span>测试前后分数有差异（正常）</span>
      </div>
    </div>
    <div id="reviewResult"></div>
  </div>

</main>

<script>
/* ===================== CONFIG ===================== */
const JSONBIN_BASE = "https://api.jsonbin.io/v3/b";
const SHARED_BIN_ID = "6a3e1ddef5f4af5e2932c1b7";
const JSONBIN_ACCESS_KEY = "$2a$10$hqvznxXZxSTDOLaUsz6YUOtRZ6grhOIE7RndKywoB9nyatysS2qPW";

/* ===================== QUESTIONS ===================== */
// type: "num" -> numeric scale buttons (min..max)
// type: "text" -> 5-point text-label scale (RRS items)
const TEXT_SCALE_OPTIONS = ["完全不符合","不太符合","中等","比较符合","完全符合"];

const QUESTIONS = [
  { id:"q3", type:"num", section:null, title:"情绪效价（愉悦度）", min:1, max:9, leftLabel:"非常不愉快", rightLabel:"非常愉快" },
  { id:"q4", type:"num", section:null, title:"情绪唤醒", min:1, max:9, leftLabel:"非常平静", rightLabel:"非常激动" },
  { id:"q5", type:"num", section:null, title:"情绪支配", min:1, max:9, leftLabel:"完全控制", rightLabel:"完全被控制" },
  { id:"q6", type:"num", section:null, title:"请评估您当前的愤怒程度", min:0, max:10, leftLabel:"一点也不生气", rightLabel:"极度生气" },

  { id:"q7", type:"text", section:"RRS放松状态量表", instruction:"指导语：请根据你现在的感受，选择最符合你的程度。", title:"我感到身体放松" },
  { id:"q8", type:"text", section:null, title:"我感到心情平静" },
  { id:"q9", type:"text", section:null, title:"我感到肌肉是松弛的" },
  { id:"q10", type:"text", section:null, title:"我没有紧张感" },
  { id:"q11", type:"text", section:null, title:"我呼吸平稳、舒缓" },
  { id:"q12", type:"text", section:null, title:"我内心没有焦虑" },
  { id:"q13", type:"text", section:null, title:"我感到安稳、踏实" },
  { id:"q14", type:"text", section:null, title:"我感到精神舒缓" },
  { id:"q15", type:"text", section:null, title:"我没有烦躁不安" },
  { id:"q16", type:"text", section:null, title:"我整体处于放松状态" },

  { id:"q17", type:"num", section:null, title:"请评价你当下的焦虑程度", min:1, max:5, leftLabel:"完全没有焦虑", rightLabel:"极度焦虑" },
  { id:"q18", type:"num", section:null, title:"请评估您当前的嗜睡程度", min:0, max:10, leftLabel:"完全不困倦", rightLabel:"极度困倦" },
  { id:"q19", type:"num", section:null, title:"请评估您当前的烦躁程度", min:0, max:10, leftLabel:"完全不烦躁", rightLabel:"极度烦躁" },
];

/* ===================== STORAGE LAYER ===================== */
// If a save fails (no network), the record goes into a "pending sync queue" stored separately,
// never deleted until confirmed saved. Retrying always re-fetches the latest cloud data first,
// then merges pending records in, so we never overwrite records other devices submitted meanwhile.

let allRecords = [];
let cloudAvailable = true;
const PENDING_KEY = "stress_survey_pending_sync";

function getPendingQueue(){
  const raw = localStorage.getItem(PENDING_KEY);
  return raw ? JSON.parse(raw) : [];
}
function setPendingQueue(queue){
  localStorage.setItem(PENDING_KEY, JSON.stringify(queue));
}
function addToPendingQueue(record){
  const queue = getPendingQueue();
  queue.push(record);
  setPendingQueue(queue);
}

async function loadRecords(){
  try{
    const res = await fetch(`${JSONBIN_BASE}/${SHARED_BIN_ID}/latest`, {
      headers: { "X-Access-Key": JSONBIN_ACCESS_KEY }
    });
    if(!res.ok) throw new Error("fetch failed: " + res.status);
    const data = await res.json();
    allRecords = (data.record && data.record.records) || [];
    cloudAvailable = true;
  }catch(e){
    cloudAvailable = false;
    console.warn("Cloud load failed, using last known cloud snapshot cached on this device.", e);
    const local = localStorage.getItem("stress_survey_last_cloud_snapshot");
    allRecords = local ? JSON.parse(local) : [];
  }
  return allRecords;
}

async function pushToCloud(recordsArray){
  const res = await fetch(`${JSONBIN_BASE}/${SHARED_BIN_ID}`, {
    method: "PUT",
    headers: { "Content-Type": "application/json", "X-Access-Key": JSONBIN_ACCESS_KEY },
    body: JSON.stringify({ records: recordsArray })
  });
  if(!res.ok) throw new Error("save failed: " + res.status);
  localStorage.setItem("stress_survey_last_cloud_snapshot", JSON.stringify(recordsArray));
}

async function saveRecords(newOrEditedRecord){
  try{
    await pushToCloud(allRecords);
    cloudAvailable = true;
    return true;
  }catch(e){
    cloudAvailable = false;
    console.warn("Cloud save failed; queuing this record for retry when network is back.", e);
    if(newOrEditedRecord) addToPendingQueue(newOrEditedRecord);
    return false;
  }
}

async function retryPendingSync(){
  const queue = getPendingQueue();
  if(queue.length === 0) return { ok:true, synced:0 };

  try{
    const res = await fetch(`${JSONBIN_BASE}/${SHARED_BIN_ID}/latest`, {
      headers: { "X-Access-Key": JSONBIN_ACCESS_KEY }
    });
    if(!res.ok) throw new Error("fetch failed: " + res.status);
    const data = await res.json();
    let latest = (data.record && data.record.records) || [];

    queue.forEach(pending => {
      const id = normId(pending.subjectId);
      latest = latest.filter(r => !(normId(r.subjectId) === id && r.group === pending.group && r.stage === pending.stage));
      latest.push(pending);
    });

    await pushToCloud(latest);
    allRecords = latest;
    setPendingQueue([]);
    cloudAvailable = true;
    return { ok:true, synced:queue.length };
  }catch(e){
    console.warn("Retry sync failed, will try again later.", e);
    cloudAvailable = false;
    return { ok:false, synced:0 };
  }
}

function updateSyncBanner(){
  const queue = getPendingQueue();
  const el = document.getElementById("syncBanner");
  if(!el) return;
  if(queue.length === 0){
    el.innerHTML = "";
    return;
  }
  el.innerHTML = `<div class="status-banner warn">⚠ 有 ${queue.length} 条记录尚未同步到云端（仅存在本设备）。
    <button id="retrySyncBtn" style="margin-left:8px;padding:4px 10px;border:none;border-radius:8px;background:var(--warn);color:#fff;cursor:pointer;font-size:12px;">立即重试</button></div>`;
  const btn = document.getElementById("retrySyncBtn");
  if(btn){
    btn.onclick = async () => {
      btn.textContent = "同步中…";
      const result = await retryPendingSync();
      updateSyncBanner();
      if(result.ok && result.synced > 0){
        alert(`成功同步 ${result.synced} 条记录到云端。`);
      } else if(!result.ok){
        alert("仍然连接失败，请检查网络后再试一次。");
      }
    };
  }
}

window.addEventListener("online", async () => {
  const result = await retryPendingSync();
  updateSyncBanner();
  if(result.ok && result.synced > 0){
    console.log(`Auto-synced ${result.synced} pending record(s) after network reconnect.`);
  }
});

/* ===================== STATE ===================== */
let state = { subjectId:"", group:null, stage:null, answers:{} };

function normId(id){ return (id || "").trim().toUpperCase(); }

/* ===================== RENDER: QUESTIONS ===================== */
function renderQuestions(){
  const card = document.getElementById("questionCard");
  card.innerHTML = "";
  QUESTIONS.forEach(q => {
    if(q.section){
      const sec = document.createElement("div");
      sec.className = "q-section-title";
      sec.textContent = q.section;
      card.appendChild(sec);
    }
    const wrap = document.createElement("div");
    wrap.className = "question";

    if(q.type === "num"){
      wrap.innerHTML = `
        <div class="q-title">${q.title}</div>
        <div class="q-anchors"><span>${q.leftLabel}</span><span>${q.rightLabel}</span></div>
        <div class="scale" id="scale-${q.id}"></div>
        <div id="refchip-${q.id}"></div>
      `;
      card.appendChild(wrap);
      const scaleDiv = wrap.querySelector(`#scale-${q.id}`);
      for(let v = q.min; v <= q.max; v++){
        const btn = document.createElement("button");
        btn.textContent = v;
        btn.dataset.val = v;
        btn.onclick = () => {
          state.answers[q.id] = v;
          scaleDiv.querySelectorAll("button").forEach(b => b.classList.remove("sel"));
          btn.classList.add("sel");
          updateSubmitState();
        };
        scaleDiv.appendChild(btn);
      }
    } else {
      // text-scale RRS question
      wrap.innerHTML = `
        ${q.instruction ? `<div class="q-instruction">${q.instruction}</div>` : ""}
        <div class="q-title">${q.title}</div>
        <div class="scale text-scale" id="scale-${q.id}"></div>
        <div id="refchip-${q.id}"></div>
      `;
      card.appendChild(wrap);
      const scaleDiv = wrap.querySelector(`#scale-${q.id}`);
      TEXT_SCALE_OPTIONS.forEach((label, idx) => {
        const btn = document.createElement("button");
        btn.textContent = label;
        btn.dataset.val = idx + 1; // store 1-5
        btn.onclick = () => {
          state.answers[q.id] = idx + 1;
          scaleDiv.querySelectorAll("button").forEach(b => b.classList.remove("sel"));
          btn.classList.add("sel");
          updateSubmitState();
        };
        scaleDiv.appendChild(btn);
      });
    }
  });
}

function answerDisplay(q, val){
  if(val === undefined) return undefined;
  return q.type === "text" ? TEXT_SCALE_OPTIONS[val - 1] : val;
}

function updateReferenceDisplay(){
  // Reference = same subject, same group, "测试前" record — shown only while filling 测试后.
  const refRecord = findReferenceRecord();
  const banner = document.getElementById("refBanner");

  QUESTIONS.forEach(q => {
    const chipDiv = document.getElementById(`refchip-${q.id}`);
    if(!chipDiv) return;
    if(refRecord && refRecord.answers[q.id] !== undefined){
      chipDiv.innerHTML = `<span class="ref-chip">测试前你填的是 <b>${answerDisplay(q, refRecord.answers[q.id])}</b></span>`;
    } else {
      chipDiv.innerHTML = "";
    }
  });

  if(state.stage === "测试后" && state.subjectId && state.group){
    if(refRecord){
      banner.innerHTML = `<div class="status-banner ok">已找到受试者 ${state.subjectId}（${state.group}）测试前的记录，填写每题时可参考。</div>`;
    } else {
      banner.innerHTML = `<div class="status-banner warn">未找到该受试者在「${state.group}」下「测试前」的记录，请确认编号/组别是否正确。</div>`;
    }
  } else {
    banner.innerHTML = "";
  }
}

function findReferenceRecord(){
  if(!state.subjectId || !state.group) return null;
  const id = normId(state.subjectId);
  return allRecords.find(r => normId(r.subjectId) === id && r.group === state.group && r.stage === "测试前") || null;
}

function findRecord(subjectId, group, stage){
  const id = normId(subjectId);
  return allRecords.find(r => normId(r.subjectId) === id && r.group === group && r.stage === stage) || null;
}

/* ===================== UI: TOP FIELDS ===================== */
document.getElementById("subjectId").addEventListener("input", (e) => {
  state.subjectId = e.target.value.trim();
  updateReferenceDisplay();
  updateSubmitState();
});

document.querySelectorAll("#groupSeg button").forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll("#groupSeg button").forEach(b => b.classList.remove("sel"));
    btn.classList.add("sel");
    state.group = btn.dataset.val;
    updateReferenceDisplay();
    updateSubmitState();
  };
});

document.querySelectorAll("#stageSeg button").forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll("#stageSeg button").forEach(b => b.classList.remove("sel"));
    btn.classList.add("sel");
    state.stage = btn.dataset.val;
    updateReferenceDisplay();
    updateSubmitState();
  };
});

function updateSubmitState(){
  const btn = document.getElementById("submitBtn");
  const allAnswered = QUESTIONS.every(q => state.answers[q.id] !== undefined);
  const headerOk = state.subjectId && state.group && state.stage;
  if(headerOk && allAnswered){
    btn.disabled = false;
    btn.textContent = "提交问卷";
  } else if(!headerOk){
    btn.disabled = true;
    btn.textContent = "请先填写编号、组别与阶段";
  } else {
    const remaining = QUESTIONS.filter(q => state.answers[q.id] === undefined).length;
    btn.disabled = true;
    btn.textContent = `还有 ${remaining} 题未填写`;
  }
}

/* ===================== SUBMIT ===================== */
document.getElementById("submitBtn").addEventListener("click", async () => {
  const existing = findRecord(state.subjectId, state.group, state.stage);
  if(existing && !confirm(`受试者 ${state.subjectId}（${state.group} / ${state.stage}）已有记录，是否覆盖？`)){
    return;
  }

  const id = normId(state.subjectId);
  const record = {
    subjectId: state.subjectId.trim(),
    group: state.group,
    stage: state.stage,
    answers: { ...state.answers },
    submittedAt: new Date().toISOString()
  };

  if(existing){
    allRecords = allRecords.filter(r => !(normId(r.subjectId) === id && r.group === state.group && r.stage === state.stage));
  }
  allRecords.push(record);

  const indicator = document.getElementById("saveIndicator");
  indicator.textContent = "正在保存…";
  const cloudOk = await saveRecords(record);
  indicator.textContent = cloudOk
    ? "✓ 已提交并同步到云端"
    : "✓ 已提交（仅保存在本设备，已加入待同步队列，网络恢复后会自动重试）";
  updateSyncBanner();

  state.subjectId = "";
  state.answers = {};
  document.getElementById("subjectId").value = "";
  renderQuestions();
  updateReferenceDisplay();
  updateSubmitState();
});

/* ===================== TABS ===================== */
document.querySelectorAll(".tab-btn").forEach(btn => {
  btn.onclick = async () => {
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    const tab = btn.dataset.tab;
    document.getElementById("tab-fill").classList.toggle("hidden", tab !== "fill");
    document.getElementById("tab-review").classList.toggle("hidden", tab !== "review");
    if(tab === "review"){
      await loadRecords();
      renderReview();
    }
  };
});

/* ===================== REVIEW TAB ===================== */
document.getElementById("lookupBtn").addEventListener("click", async () => {
  await loadRecords();
  renderReview();
});

function buildGroupTable(records, group, groupLabel, tagClass){
  const pre = records.find(r => r.group === group && r.stage === "测试前");
  const post = records.find(r => r.group === group && r.stage === "测试后");
  const cols = [pre, post].filter(Boolean);
  if(cols.length === 0) return "";

  let html = `<div class="group-block"><h3 class="${tagClass}">${groupLabel}</h3>`;
  html += `<table class="compare"><thead><tr><th class="qname">题目</th>`;
  cols.forEach((c) => {
    const editKey = `${group}|${c.stage}`;
    html += `<th>${c.stage}<div class="record-meta">${new Date(c.submittedAt).toLocaleString('zh-CN',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'})}</div><button class="edit-btn" data-edit-key="${editKey}">✎ 修改</button></th>`;
  });
  html += `</tr></thead><tbody>`;

  const hasBoth = cols.length === 2;
  QUESTIONS.forEach(q => {
    html += `<tr><td class="qname">${q.title}</td>`;
    cols.forEach((c) => {
      const v = c.answers[q.id];
      let cls = "";
      if(hasBoth){
        const otherV = (c.stage === "测试前" ? post : pre).answers[q.id];
        cls = (v === otherV) ? "flag-same" : "flag-diff";
      }
      html += `<td class="${cls}">${answerDisplay(q, v) ?? "—"}</td>`;
    });
    html += `</tr>`;
  });
  html += `</tbody></table></div>`;
  return html;
}

function renderReview(){
  const id = document.getElementById("lookupId").value.trim();
  const resultDiv = document.getElementById("reviewResult");
  if(!id){
    resultDiv.innerHTML = `<div class="empty-state">请输入受试者编号查看对比结果</div>`;
    return;
  }
  const normLookup = normId(id);
  const records = allRecords.filter(r => normId(r.subjectId) === normLookup);
  if(records.length === 0){
    resultDiv.innerHTML = `<div class="empty-state">未找到受试者 ${id} 的任何记录</div>`;
    return;
  }

  let html = `<div class="card">`;
  const ctrlTable = buildGroupTable(records, "对照组", "对照组（测试前 vs 测试后）", "tag-ctrl");
  const expTable = buildGroupTable(records, "实验组", "实验组（测试前 vs 测试后）", "tag-exp");
  html += ctrlTable || `<div class="group-block"><h3 class="tag-ctrl">对照组</h3><div class="small-note">该受试者暂无对照组记录。</div></div>`;
  html += expTable || `<div class="group-block"><h3 class="tag-exp">实验组</h3><div class="small-note">该受试者暂无实验组记录。</div></div>`;
  html += `<div class="small-note">标红表示该受试者在同一组别下，测试前与测试后填了完全相同的分数 —— 建议核对访谈记录是否一致。</div>`;
  html += `</div>`;
  resultDiv.innerHTML = html;

  resultDiv.querySelectorAll(".edit-btn").forEach(btn => {
    btn.onclick = () => {
      const [group, stage] = btn.dataset.editKey.split("|");
      const record = records.find(r => r.group === group && r.stage === stage);
      if(record) loadRecordForEditing(record);
    };
  });
}

function loadRecordForEditing(record){
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.toggle("active", b.dataset.tab === "fill"));
  document.getElementById("tab-fill").classList.remove("hidden");
  document.getElementById("tab-review").classList.add("hidden");

  state.subjectId = record.subjectId;
  state.group = record.group;
  state.stage = record.stage;
  state.answers = { ...record.answers };

  document.getElementById("subjectId").value = record.subjectId;
  document.querySelectorAll("#groupSeg button").forEach(b => b.classList.toggle("sel", b.dataset.val === record.group));
  document.querySelectorAll("#stageSeg button").forEach(b => b.classList.toggle("sel", b.dataset.val === record.stage));

  renderQuestions();
  QUESTIONS.forEach(q => {
    const val = record.answers[q.id];
    if(val === undefined) return;
    const scaleDiv = document.getElementById(`scale-${q.id}`);
    if(!scaleDiv) return;
    scaleDiv.querySelectorAll("button").forEach(b => {
      b.classList.toggle("sel", parseInt(b.dataset.val,10) === val);
    });
  });

  updateReferenceDisplay();
  updateSubmitState();

  const banner = document.getElementById("refBanner");
  banner.innerHTML = `<div class="status-banner info">正在修改受试者 ${record.subjectId}（${record.group} / ${record.stage}）已提交的记录，改完后点"提交问卷"会覆盖原记录。</div>` + banner.innerHTML;

  window.scrollTo({ top: 0, behavior: "smooth" });
}

/* ===================== EXPORT CSV ===================== */
function toLocalTime(isoString){
  const d = new Date(isoString);
  return d.toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai', hour12: false });
}
  function buildCsv(){
  const headers = ["受试者编号","组别","阶段","提交时间", ...QUESTIONS.map(q => q.title)];
  const rows = allRecords
    .slice()
    .sort((a,b) => a.subjectId.localeCompare(b.subjectId) || a.group.localeCompare(b.group) || a.stage.localeCompare(b.stage))
    .map(r => [
      r.subjectId, r.group, r.stage, r.submittedAt,
      ...QUESTIONS.map(q => answerDisplay(q, r.answers[q.id]) ?? "")
    ]);
  const escape = (val, isId) => {
    const s = String(val ?? "");
    if(isId) return `="${s.replace(/"/g,'""')}"`;
    return /[",\n]/.test(s) ? `"${s.replace(/"/g,'""')}"` : s;
  };
  const csvLines = [headers, ...rows].map((row, rowIdx) =>
    row.map((cell, colIdx) => escape(cell, rowIdx > 0 && colIdx === 0)).join(",")
  );
  return "\uFEFF" + csvLines.join("\r\n");
}

function downloadCsv(){
  const csv = buildCsv();
  const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  const ts = new Date().toISOString().slice(0,10);
  a.href = url;
  a.download = `情绪压力测试_全部数据_${ts}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

(function addExportButton(){
  const btn = document.createElement("button");
  btn.className = "export-btn";
  btn.textContent = "⬇ 导出全部受试者数据（CSV / Excel可打开）";
  btn.onclick = async () => {
    await loadRecords();
    if(allRecords.length === 0){
      alert("目前还没有任何已提交的数据。");
      return;
    }
    downloadCsv();
  };
  document.getElementById("tab-review").querySelector(".card").appendChild(btn);
})();

/* ===================== INIT ===================== */
(async function init(){
  renderQuestions();
  updateSubmitState();
  await loadRecords();
  await retryPendingSync();
  updateSyncBanner();
})();
</script>
